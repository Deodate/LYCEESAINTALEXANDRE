spring.application.name=backend

# Logging Configuration
logging.level.com.lycee=DEBUG
logging.level.org.springframework.web=DEBUG
logging.level.org.springframework.web.servlet.DispatcherServlet=TRACE

# Database Configuration (PostgreSQL)
spring.datasource.url=jdbc:postgresql://localhost:5432/lyceedb
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

server.port=9090

# JWT Configuration
lycee.app.jwtSecret=WW91clN0cm9uZ0pXVFNlY3JldEtleVRoYXRJc0F0TGVhc3QyNTZCaXRzTG9uZ0FuZFNob3VsZEJlQ2hhbmdlZEluUHJvZHVjdGlvbg==
lycee.app.jwtExpirationMs=7776000000

# Email Configuration
spring.mail.host=your.smtp.host.com
spring.mail.port=587
spring.mail.username=your_email@example.com
spring.mail.password=your_email_password
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Frontend URL for password reset links
app.frontend.url=http://localhost:3000

# Thymeleaf Configuration for Email Templates
spring.thymeleaf.cache=false
