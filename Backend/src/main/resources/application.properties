spring.application.name=backend

# Swagger / OpenAPI: avoid stale spec after code changes (restart still recommended)
springdoc.cache.disabled=true
# Swagger UI: keep numbered tags in order (1., 2., …)
springdoc.swagger-ui.tags-sorter=alpha

# Logging Configuration
logging.level.com.lycee=DEBUG
logging.level.org.springframework.web=DEBUG
logging.level.org.springframework.web.servlet.DispatcherServlet=TRACE

# Database Configuration (PostgreSQL)
spring.datasource.url=jdbc:postgresql://localhost:5432/lyceedb
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
# Hibernate 6 infers PostgreSQL dialect from JDBC URL; explicit dialect is deprecated.
spring.jpa.open-in-view=false

# Flyway: versioned SQL migrations (runs before Hibernate). V1 creates refresh_tokens if missing.
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
# Existing DB already had tables but no flyway_schema_history: baseline once, then migrate forward (non-destructive).
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0

server.port=9090

# JWT Configuration
lycee.app.jwtSecret=WW91clN0cm9uZ0pXVFNlY3JldEtleVRoYXRJc0F0TGVhc3QyNTZCaXRzTG9uZ0FuZFNob3VsZEJlQ2hhbmdlZEluUHJvZHVjdGlvbg==
# Access JWT: 15 minutes
lycee.app.jwtExpirationMs=900000
# Refresh token: 30 days
lycee.app.refreshTokenExpirationMs=2592000000
# If true, delete all refresh tokens for the user on each POST /signin (single active session). Default false until product confirms.
lycee.app.auth.single-session-on-signin=false

# Email — Mailtrap (https://mailtrap.io): use inbox SMTP credentials (free tier).
# In Mailtrap: Email Testing → Inboxes → Integration → SMTP. Replace username/password below.
spring.mail.host=sandbox.smtp.mailtrap.io
spring.mail.port=2525
spring.mail.username=REPLACE_WITH_MAILTRAP_USERNAME
spring.mail.password=REPLACE_WITH_MAILTRAP_PASSWORD
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

# Public API base URL (used in verification email as an alternative to the frontend link)
app.api.public-url=http://localhost:9090

# Frontend URL (verification button + password reset). Add a route that reads ?token= and optionally calls GET /api/v1/auth/verify
app.frontend.url=http://localhost:3000
app.email.verification-frontend-path=/verify-email

# Thymeleaf Configuration for Email Templates
spring.thymeleaf.cache=false
